global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: reservation-platform
    env: development

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: fastapi
    static_configs:
      - targets: [backend:8000]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: postgres-exporter
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis-exporter
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: nginx
    static_configs:
      - targets: [nginx-exporter:9113]

  - job_name: celery
    static_configs:
      - targets: [flower:5555]
    metrics_path: /metrics
