version: "3.9"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-reservation_platform}
  REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@redis:6379/2
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-production-min-32-chars}
  JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-dev-refresh-secret-key-change-in-production-32+}
  SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-minimum-32-chars}
  SMTP_HOST: ${SMTP_HOST:-mailhog}
  SMTP_PORT: ${SMTP_PORT:-1025}
  SMTP_TLS: "false"
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@platform.local}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
  APP_ENV: ${APP_ENV:-development}
  APP_DEBUG: "true"
  LOG_LEVEL: INFO
  PROMETHEUS_ENABLED: "true"

networks:
  app-net:
    driver: bridge
  monitoring-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks: [app-net]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reservation_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reservation_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [app-net]
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    networks: [app-net, monitoring-net]
    environment:
      <<: *backend-env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: celery-worker
    restart: unless-stopped
    networks: [app-net]
    environment:
      <<: *backend-env
    depends_on:
      - redis
      - postgres
    deploy:
      replicas: 2

  # ── Celery Beat ───────────────────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: celery-beat
    restart: unless-stopped
    networks: [app-net]
    environment:
      <<: *backend-env
    depends_on:
      - redis
      - postgres

  # ── Celery Flower ─────────────────────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    networks: [app-net, monitoring-net]
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flower123}
    ports:
      - "5555:5555"
    depends_on: [redis]

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    networks: [app-net]
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/postcss.config.js:/app/postcss.config.js:ro
      - ./frontend/tailwind.config.js:/app/tailwind.config.js:ro
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # ── Nginx ─────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    networks: [app-net]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

  # ── MailHog (dev email) ───────────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    networks: [app-net]
    ports:
      - "1025:1025"
      - "8025:8025"

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    networks: [monitoring-net]
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--log.level=warn"

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    networks: [monitoring-net]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
      GF_LOG_LEVEL: warn
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on: [prometheus]

  # ── Loki ──────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    networks: [monitoring-net]
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml -log.level=warn

  # ── Promtail (log shipper) ────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    networks: [monitoring-net]
    volumes:
      - ./infrastructure/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml -log.level=warn
    depends_on: [loki]
